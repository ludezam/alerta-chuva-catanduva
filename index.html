<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>⛈️ Alerta de Chuva</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <h1>🌧️ Alerta de Chuva </h1>

  <div class="mapa-fixo-container">
    <small id="mapaLegenda">Aguardando sua localização para carregar o mapa</small>
    <iframe
      id="mapaRadar"
      class="mapa-fixo"
      src="about:blank"
      title="Mapa em tempo real">
    </iframe>
  </div>

  <div class="box">
      <div id="cidadeAtual" class="cidade-atual">
    📍 Cidade: <b>Aguardando localização...</b>
  </div>
    <div class="status" id="status">⏳ Carregando...</div>
    <div id="detalhe"></div>
    <div id="alerta"></div>
  <!--  <div id="contador"></div> -->
    <div id="ultimaAtualizacao"></div>
  </div>

  <div class="busca">
    <input
      id="cidade"
      type="text"
      placeholder="Digite a cidade"
      aria-label="Nome da cidade"
    >
    <button id="btnBuscar" type="button">🔎 Buscar cidade</button>
    <button id="btnGPS" type="button">📍 Meu local atual</button>
  </div>

  <footer>
    <button id="btnRefresh">🔄 Atualizar</button> 
    <br>
    <small>Desenvolvido por LDZ</small>
  </footer>

  <audio id="alertSound" preload="auto">
    <source src="alerta.mp3" type="audio/mpeg">
  </audio>

</body>
</html>
