<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>⛈️ Alerta de Chuva</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <h1>🌧️ Alerta de Chuva </h1>

  <div class="mapa-fixo-container">
    <small id="mapaLegenda">Mapa em tempo real, atualizado a cada 10min </small>
    <iframe
      id="mapaRadar"
      class="mapa-fixo"
      src="https://www.rainviewer.com/map.html?loc=-20.8113,-49.3758,10&oCS=1&c=3&o=83&lm=1&layer=radar&sm=1&sn=1"
      title="Mapa em tempo real, atualizado a cada 10min">
    </iframe>
  </div>

  <div class="mapa-fixo-container">
    <small>Radar IPMet (site oficial em iframe)</small>
    <div class="mapa-ipmet-frame">
      <iframe
        id="mapaIpmet"
        class="mapa-fixo mapa-ipmet"
        src="https://www.ipmetradar.com.br/"
        title="Radar IPMet"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
    <small>
      Se o site não abrir no iframe, use
      <a href="https://www.ipmetradar.com.br/" target="_blank" rel="noopener noreferrer">este link direto</a>.
    </small>
  </div>

  <div class="box">
      <div id="cidadeAtual" class="cidade-atual">
    📍 Cidade: <b>São José do Rio Preto-SP</b>
  </div>
    <div class="status" id="status">⏳ Carregando...</div>
    <div id="detalhe"></div>
    <div id="alerta"></div>
  <!--  <div id="contador"></div> -->
    <div id="ultimaAtualizacao"></div>
  </div>

  <div class="busca">
    <input
      id="cidade"
      type="text"
      placeholder="Digite a cidade"
      aria-label="Nome da cidade"
    >
    <button id="btnBuscar" type="button">🔎 Buscar cidade</button>
    <button id="btnGPS" type="button">📍 Meu local atual</button>
  </div>

  <footer>
    <button id="btnRefresh">🔄 Atualizar</button> 
    <br>
    <small>Desenvolvido por LDZ</small>
  </footer>

  <audio id="alertSound" preload="auto">
    <source src="alerta.mp3" type="audio/mpeg">
  </audio>

</body>
</html>
